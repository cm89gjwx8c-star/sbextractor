name: Build and Release

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'release.zip'
      - '.github/workflows/**'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pyyaml fdb requests pillow pystray

    - name: Run build script
      run: python build.py

    - name: Commit and push release.zip
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Auto-update release.zip from GitHub Action [skip ci]"
        file_pattern: 'release.zip'
        branch: main
